<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DA System{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <nav class="border-b border-gray-100 bg-white px-6 py-3 flex items-center">
    <a href="/" class="flex items-center gap-3">
      <div class="w-8 h-8 bg-gray-900 rounded-md flex items-center justify-center">
        <span class="text-white text-xs font-medium">DA</span>
      </div>
      <div>
        <div class="text-sm font-medium leading-none">DA System</div>
        <div class="text-xs text-gray-400 mt-0.5">Decision Architecture for Commerce</div>
      </div>
    </a>
  </nav>
  <main class="max-w-3xl mx-auto px-6 py-8">{% block content %}{% endblock %}</main>
</body>
</html>
